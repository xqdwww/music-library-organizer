name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install synthetic-media test tool
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install
        run: python -m pip install --disable-pip-version-check ".[dev]"
      - name: Compile
        run: python -m compileall -q src tests
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Build
        run: python -m build
      - name: Validate distributions
        run: python -m pip install --force-reinstall --no-deps dist/*.whl && music-organizer --version
